repos:
  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black
        language_version: python3
  - repo: https://github.com/PyCQA/isort
    rev: 6.1.0
    hooks:
      - id: isort
        language_version: python3
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        language_version: python3
  - repo: local
    hooks:
      - id: pytest-changed
        name: pytest for changed files
        entry: .venv/bin/python scripts/run_changed_tests.py
        language: system
        pass_filenames: true
        always_run: true
        stages: [commit]
