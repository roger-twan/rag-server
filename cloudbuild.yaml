steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - gcr.io/$PROJECT_ID/rag-sever
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/rag-sever
images:
  - gcr.io/$PROJECT_ID/rag-sever
options:
  logging: CLOUD_LOGGING_ONLY
