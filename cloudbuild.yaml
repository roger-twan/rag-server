steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/rag-server:$SHORT_SHA', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/rag-server:$SHORT_SHA']
- name: 'gcr.io/cloud-builders/gcloud'
  args:
    - 'run'
    - 'deploy'
    - 'rag-server'
    - '--image'
    - 'gcr.io/$PROJECT_ID/rag-server:$SHORT_SHA'
    - '--region'
    - 'us-central1'
    - '--platform'
    - 'managed'
images:
- 'gcr.io/$PROJECT_ID/rag-server:$SHORT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY
