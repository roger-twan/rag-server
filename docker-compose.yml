services:
  postgres:
    image: postgres:16-alpine
    container_name: rag-server-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag_server_db
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_server_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
